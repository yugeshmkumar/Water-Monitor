name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Firmware Testing
  firmware-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          cd firmware/tank-sensor
          pip install pytest pytest-cov
      
      - name: Run firmware tests
        run: |
          cd firmware/tank-sensor
          pytest tests/ --cov=src --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./firmware/tank-sensor/coverage.xml

  # Firmware Linting
  firmware-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Lint with flake8
        run: |
          pip install flake8
          # Lint firmware test code
          flake8 firmware/tank-sensor/tests --count --select=E9,F63,F7,F82 --show-source --statistics || true

  # iOS Testing
  ios-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Run iOS tests
        run: |
          cd ios-app/mobile
          xcodebuild test -scheme WaterMonitor -destination 'platform=iOS Simulator,name=iPhone 14' || true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ios-test-results
          path: ios-app/mobile/build

  # Code Quality
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run security scan
        run: |
          echo "Security scanning codebase..."
          # Add security scanning tools as needed

permissions:
  contents: read
  checks: write
  pull-requests: write
